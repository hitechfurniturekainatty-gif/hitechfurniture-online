<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>My Hitech — Furniture & Interiors</title>
    <meta name="description" content="My Hitech live catalog. Sofas, beds, wardrobes and more with MRP, colors, and instant WhatsApp inquiry." />
    <meta name="author" content="My Hitech" />
    <meta name="theme-color" content="#0E5C66" />

    <!-- Always re-fetch the HTML shell so users never see a stale homepage after we ship updates. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Brand icons: favicon (browser tab) + apple-touch-icon (Add-to-Home-Screen on iOS/Android) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect to Supabase so the home page's first DB call skips the TLS/DNS handshake -->
    <link rel="preconnect" href="https://thwleiywbpyccgtacczv.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://thwleiywbpyccgtacczv.supabase.co" />
    <!-- Non-blocking font load: critical for mobile networks. Fonts apply once ready, but text paints immediately with system fallback. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&family=Sora:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Open Graph / WhatsApp link preview: shows brand image + name when a link is shared -->
    <meta property="og:title" content="My Hitech — Furniture & Interiors" />
    <meta property="og:description" content="My Hitech live furniture catalog with MRP, colors and WhatsApp inquiry." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="My Hitech" />

    <!-- Twitter Card (used by some apps for richer link previews) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="My Hitech — Furniture & Interiors" />
    <meta name="twitter:description" content="My Hitech live furniture catalog with MRP, colors and WhatsApp inquiry." />
    <meta name="twitter:image" content="/og-image.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
